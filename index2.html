<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stardust Creator - 3D 粒子手势交互系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; color: #fff; touch-action: manipulation; -webkit-overflow-scrolling: none; overscroll-behavior: none; }
        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 1; touch-action: manipulation; }

        /* 隐藏的摄像头预览（用于检测） */
        #webcam { transform: scaleX(-1); position: absolute; bottom: 20px; left: 20px; width: 160px; height: 120px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); z-index: 10; object-fit: cover; display: none; }

        /* 现代极简 UI 面板 */
        #ui-panel { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(10, 10, 15, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); padding: 24px; border-radius: 16px; width: 280px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: opacity 0.3s, transform 0.3s, visibility 0.3s; }
        #ui-panel.hidden { opacity: 0; transform: translateX(20px); visibility: hidden; pointer-events: none; }

        /* 控制台折叠按钮 */
        #btn-toggle-panel { position: absolute; top: 24px; right: 310px; z-index: 11; width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(8px); color: rgba(255,255,255,0.7); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        #btn-toggle-panel:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.4); }
        #btn-toggle-panel.shifted { right: 20px; }
        h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; color: rgba(255,255,255,0.9); text-transform: uppercase; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }

        /* 形状选择按钮 */
        .shape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-shape { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .btn-shape:hover, .btn-shape:focus-visible, .btn-shape.active { background: #fff; color: #000; font-weight: bold; border-color: #fff; outline: none; }

        /* 颜色选择器自定义 */
        .color-picker-wrapper { display: flex; align-items: center; gap: 12px; }
        input[type="color"] { -webkit-appearance: none; appearance: none; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; }

        /* 功能按钮 */
        .btn-action { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 8px; transition: background 0.3s; }
        .btn-action:hover, .btn-action:focus-visible { background: rgba(255,255,255,0.2); outline: none; }

        /* 状态提示 */
        #status-tip { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 5; font-size: 14px; color: rgba(255,255,255,0.4); pointer-events: none; }

        /* 摄像头上方镜像提示 */
        .cam-mirror-badge { position: absolute; bottom: 148px; left: 20px; z-index: 11; font-size: 10px; color: rgba(255,255,255,0.35); pointer-events: none; display: none; }

        /* 启动遮罩层 */
        #start-overlay { position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(8px); }
        #start-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 16px 48px; border-radius: 12px; cursor: pointer; font-size: 18px; letter-spacing: 2px; transition: all 0.3s; }
        #start-btn:hover, #start-btn:focus-visible { background: #fff; color: #000; border-color: #fff; outline: none; }

        /* 加载指示器 */
        .loader { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00ffcc; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 错误提示 */
        #error-toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; background: rgba(220, 38, 38, 0.9); padding: 16px 32px; border-radius: 12px; font-size: 14px; text-align: center; display: none; }

        /* 色彩模式切换按钮 */
        .mode-toggle-group { display: flex; gap: 6px; }
        .btn-mode { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 6px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-mode:hover, .btn-mode:focus-visible, .btn-mode.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); outline: none; }

        /* 调色板色块横排 */
        .palette-strip { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .palette-color-item { position: relative; }
        .palette-dot { -webkit-appearance: none; appearance: none; width: 34px; height: 34px; border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; cursor: pointer; padding: 0; background: none; transition: transform 0.2s, border-color 0.2s; }
        .palette-dot:hover { transform: scale(1.15); border-color: #fff; }
        .palette-dot::-webkit-color-swatch-wrapper { padding: 0; }
        .palette-dot::-webkit-color-swatch { border-radius: 50%; border: none; }

        /* 调色板增减按钮 */
        .btn-palette-action { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-palette-action:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
        .btn-palette-action:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            #ui-panel { top: auto; bottom: 0; right: 0; width: 100%; border-radius: 16px 16px 0 0; padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px)); max-height: 45vh; overflow-y: auto; }
            h3 { font-size: 14px; margin-bottom: 10px; }
            .control-group { margin-bottom: 12px; }
            .btn-shape { padding: 12px 8px; font-size: 12px; min-height: 44px; }
            .btn-action { min-height: 44px; }
            .btn-mode { min-height: 44px; padding: 10px 6px; font-size: 13px; }
            .palette-dot { width: 38px; height: 38px; }
            .btn-palette-action { width: 36px; height: 36px; font-size: 18px; }
            #webcam { bottom: auto; top: 10px; left: 10px; width: 100px; height: 75px; }
            .cam-mirror-badge { bottom: auto; top: 92px; left: 10px; }
            #start-btn { width: 80%; padding: 18px 36px; font-size: 20px; }
            #status-tip { font-size: 12px; bottom: 12px; }
            #single-color-controls .color-picker-wrapper { gap: 16px; }
            #single-color-controls input[type="color"] { width: 44px; height: 44px; }
            #btn-toggle-panel { top: 12px; right: auto; left: 12px; width: 40px; height: 40px; font-size: 18px; }
            #btn-toggle-panel.shifted { left: 12px; right: auto; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>
    <span class="cam-mirror-badge">镜像画面</span>
    <div id="status-tip">准备就绪 — 点击按钮启动体验</div>

    <!-- 启动遮罩 -->
    <div id="start-overlay">
        <button id="start-btn" aria-label="启动手势交互系统">启 动</button>
    </div>

    <!-- 错误提示 -->
    <div id="error-toast"></div>

    <!-- UI 面板折叠按钮 -->
    <button id="btn-toggle-panel" aria-label="切换控制台">☰</button>

    <div id="ui-panel">
        <h3>星尘控制台</h3>

        <div class="control-group">
            <label for="shape-group">粒子形态</label>
            <div id="shape-group" class="shape-grid">
                <button class="btn-shape active" data-shape="saturn" aria-label="土星形态">土星</button>
                <button class="btn-shape" data-shape="heart" aria-label="爱心形态">爱心</button>
                <button class="btn-shape" data-shape="flower" aria-label="花朵形态">花朵</button>
                <button class="btn-shape" data-shape="firework" aria-label="烟花形态">烟花</button>
            </div>
        </div>

        <div class="control-group">
            <label>色彩模式</label>
            <div class="mode-toggle-group">
                <button class="btn-mode active" data-mode="rainbow">彩虹</button>
                <button class="btn-mode" data-mode="palette">调色板</button>
                <button class="btn-mode" data-mode="single">单色</button>
            </div>
        </div>

        <!-- 彩虹模式面板 -->
        <div class="control-group" id="rainbow-controls">
            <label for="flow-speed">彩虹流速</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="range" id="flow-speed" min="0.02" max="0.5" step="0.01" value="0.15" style="flex: 1; accent-color: #00ffcc;">
                <span id="flow-speed-val" style="font-size: 13px; color: rgba(255,255,255,0.7); font-family: monospace;">0.15</span>
            </div>
        </div>

        <!-- 调色板模式面板（默认隐藏） -->
        <div class="control-group" id="palette-controls" style="display:none;">
            <label>调色板颜色</label>
            <div class="palette-strip" id="palette-strip">
                <div class="palette-color-item">
                    <input type="color" class="palette-dot" value="#ff006e" data-index="0">
                </div>
                <div class="palette-color-item">
                    <input type="color" class="palette-dot" value="#ffbe0b" data-index="1">
                </div>
                <div class="palette-color-item">
                    <input type="color" class="palette-dot" value="#00ffcc" data-index="2">
                </div>
            </div>
            <div style="display: flex; gap: 6px; margin-top: 8px;">
                <button class="btn-palette-action" id="btn-add-color" title="添加颜色">+</button>
                <button class="btn-palette-action" id="btn-remove-color" title="移除颜色">&minus;</button>
            </div>
        </div>

        <!-- 单色模式面板（默认隐藏） -->
        <div class="control-group" id="single-color-controls" style="display:none;">
            <label for="particle-color">单色选择</label>
            <div class="color-picker-wrapper">
                <input type="color" id="particle-color" value="#00ffcc" aria-label="粒子颜色选择">
                <span id="color-hex" style="font-size: 13px; color: rgba(255,255,255,0.7)">#00ffcc</span>
            </div>
        </div>

        <div class="control-group">
            <label for="particle-size">粒子大小</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="range" id="particle-size" min="0.05" max="0.8" step="0.01" value="0.25" aria-label="粒子大小滑块" aria-valuemin="0.05" aria-valuemax="0.8" aria-valuenow="0.25" style="flex: 1; accent-color: #00ffcc;">
                <span id="size-val" style="font-size: 13px; color: rgba(255,255,255,0.7); font-family: monospace;">0.25</span>
            </div>
        </div>

        <div class="control-group">
            <label for="global-rot-speed">自转速度</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="range" id="global-rot-speed" min="0.0" max="1.5" step="0.05" value="0.3" aria-label="自转速度滑块" aria-valuemin="0.0" aria-valuemax="1.5" aria-valuenow="0.3" style="flex: 1; accent-color: #00ffcc;">
                <span id="speed-val" style="font-size: 13px; color: rgba(255,255,255,0.7); font-family: monospace;">0.30x</span>
            </div>
        </div>

        <button class="btn-action" id="btn-fullscreen" aria-label="全屏切换">全屏切换</button>
    </div>

    <!-- CDN 脚本（带错误回退） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
            onerror="document.getElementById('error-toast') && (function(e){ e.style.display='block'; e.textContent='Three.js 核心库加载失败，请检查网络连接'; })(document.getElementById('error-toast'))"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"
            onerror="document.getElementById('error-toast') && (function(e){ e.style.display='block'; e.textContent='MediaPipe 摄像头库加载失败，请检查网络连接'; })(document.getElementById('error-toast'))"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"
            onerror="document.getElementById('error-toast') && (function(e){ e.style.display='block'; e.textContent='MediaPipe 手势识别库加载失败，请检查网络连接'; })(document.getElementById('error-toast'))"></script>

    <script>
    (function() {
        // ---- 资源加载状态检查 ----
        if (typeof THREE === 'undefined') {
            showError('Three.js 加载失败，请检查网络连接后刷新页面');
            return;
        }

        // ---- 1. 全局变量与配置 ----
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
        const clock = new THREE.Clock();
        let scene, camera, renderer, particleSystem, starField, shaderMaterial;
        const PARTICLE_COUNT = (function() {
            const cores = navigator.hardwareConcurrency || 4;
            if (isMobile) return Math.min(cores <= 4 ? 6000 : 8000, 8000);
            if (cores <= 2) return 6000;
            if (cores <= 4) return 10000;
            return 15000;
        })();

        let currentPositions = new Float32Array(PARTICLE_COUNT * 3);
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        // 交互缓动变量
        let targetSpread = 0.0;
        let currentSpread = 0.0;
        let currentRotationAxis = 'X';
        let userSpeedSetting = 0.3;
        const animSpeedMul = 0.09;

        // 手势粘滞平滑
        let smoothedFingerLength = 0.3;
        let axisStickFrames = 0;
        const AXIS_STICK_MAX = 20;
        const SMOOTH_FACTOR = 0.12;
        const ZERO_SPEED = 0.0001;

        // 相机控制
        const cam = { curDist: 30, targetDist: 30 };

        let animFrameId = null;
        let cameraStream = null;
        let isRunning = true;

        // ---- DOM 元素绑定 ----
        const $ = (sel) => document.querySelector(sel);
        const statusTip = $('#status-tip');
        const colorHex = $('#color-hex');
        const sizeVal = $('#size-val');
        const speedVal = $('#speed-val');
        const errorToast = $('#error-toast');
        const webcamEl = $('#webcam');
        const camBadge = $('.cam-mirror-badge');

        // ---- 错误提示 ----
        function showError(msg) {
            if (errorToast) {
                errorToast.textContent = msg;
                errorToast.style.display = 'block';
                setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
            }
        }

        // ---- 2. 初始化 Three.js 环境 ----
        const VERTEX_SHADER = /* glsl */`
            uniform float uTime;
            uniform int uColorMode;
            uniform vec3 uSingleColor;
            uniform float uFlowSpeed;
            uniform float uSize;
            uniform vec3 uPaletteColors[5];
            uniform int uPaletteSize;

            attribute float hueOffset;
            varying vec3 vColor;

            vec3 hsl2rgb(float h, float s, float l) {
                vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
                return l + s * (rgb - 0.5) * (1.0 - abs(2.0 * l - 1.0));
            }

            vec3 samplePalette(float t) {
                if (uPaletteSize <= 1) return uPaletteColors[0];
                t = fract(t);
                float scaledT = t * float(uPaletteSize - 1);
                int idx = int(floor(scaledT));
                int nextIdx = min(idx + 1, uPaletteSize - 1);
                float frac = scaledT - float(idx);
                return mix(uPaletteColors[idx], uPaletteColors[nextIdx], frac);
            }

            void main() {
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                gl_PointSize = uSize * (300.0 / -mvPosition.z);

                vec3 color;
                if (uColorMode == 0) {
                    color = uSingleColor;
                } else if (uColorMode == 1) {
                    float hue = fract(hueOffset + uTime * uFlowSpeed);
                    color = hsl2rgb(hue, 0.85, 0.6);
                } else {
                    float t = fract(hueOffset + uTime * uFlowSpeed * 0.6);
                    color = samplePalette(t);
                }
                vColor = color;
            }
        `;

        const FRAGMENT_SHADER = /* glsl */`
            varying vec3 vColor;

            void main() {
                float d = length(gl_PointCoord - 0.5) * 2.0;
                float alpha = 1.0 - smoothstep(0.3, 0.95, d);
                if (alpha < 0.01) discard;
                gl_FragColor = vec4(vColor * alpha, alpha);
            }
        `;

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, cam.curDist);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.domElement.addEventListener('webglcontextlost', handleContextLost, false);
            container.appendChild(renderer.domElement);

            // 阻止移动端默认触摸手势（页面滚动/缩放）干扰画布交互
            renderer.domElement.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
            renderer.domElement.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

            // 创建星空背景
            createStarField();

            // 创建粒子几何体
            const geometry = new THREE.BufferGeometry();
            generateSaturn(currentPositions);
            generateSaturn(targetPositions);

            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

            // 为每个粒子分配随机色相偏移（0~1），作为粒子的颜色"身份标识"
            const hueOffsets = new Float32Array(PARTICLE_COUNT);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                hueOffsets[i] = Math.random();
            }
            geometry.setAttribute('hueOffset', new THREE.BufferAttribute(hueOffsets, 1));

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime:           { value: 0 },
                    uColorMode:      { value: 1 },
                    uSingleColor:    { value: new THREE.Color('#00ffcc') },
                    uFlowSpeed:      { value: 0.15 },
                    uSize:           { value: 0.25 },
                    uPaletteColors:  { value: [
                        new THREE.Color('#ff006e'),
                        new THREE.Color('#ffbe0b'),
                        new THREE.Color('#00ffcc'),
                        new THREE.Color('#3a86ff'),
                        new THREE.Color('#8338ec')
                    ]},
                    uPaletteSize:    { value: 3 },
                },
                vertexShader:   VERTEX_SHADER,
                fragmentShader: FRAGMENT_SHADER,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });

            particleSystem = new THREE.Points(geometry, shaderMaterial);
            particleSystem.frustumCulled = false;
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
        }

        function createStarField() {
            const starCount = isMobile ? 800 : 2000;
            const starsGeo = new THREE.BufferGeometry();
            const starsPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i += 3) {
                // 随机分布在大球壳上
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 25 + Math.random() * 15;
                starsPos[i] = r * Math.sin(phi) * Math.cos(theta);
                starsPos[i + 1] = r * Math.sin(phi) * Math.sin(theta);
                starsPos[i + 2] = r * Math.cos(phi);
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            const starsMat = new THREE.PointsMaterial({
                size: 0.12,
                color: 0xffffff,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });
            starField = new THREE.Points(starsGeo, starsMat);
            starField.frustumCulled = false;
            scene.add(starField);
        }

        // ---- 3. 数学模型生成器 (Shape Algorithms) ----

        // 通用 lerp 插值
        function lerp(a, b, t) { return a + (b - a) * t; }

        function generateSaturn(array) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (i < PARTICLE_COUNT * 0.4) {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);
                    const r = Math.cbrt(Math.random()) * 4;
                    array[i3] = r * Math.sin(phi) * Math.cos(theta);
                    array[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    array[i3 + 2] = r * Math.cos(phi);
                } else {
                    const theta = Math.random() * Math.PI * 2;
                    const r = 6 + Math.random() * 6;
                    array[i3] = r * Math.cos(theta);
                    array[i3 + 1] = (Math.random() - 0.5) * 0.5;
                    array[i3 + 2] = r * Math.sin(theta);
                }
            }
        }

        function generateHeart(array) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const t = Math.random() * Math.PI * 2;

                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

                // 基于 XY 轮廓计算 Z 轴深度，使爱心有球体般的体积感
                const contourDist = Math.sqrt(x * x + y * y) / 22;
                const maxZ = 3.5 * (1 - contourDist * 0.6);
                const z = (Math.random() - 0.5) * 2 * Math.max(maxZ, 0.4);

                array[i3] = x * 0.4;
                array[i3 + 1] = y * 0.4;
                array[i3 + 2] = z * 0.4;
            }
        }

        function generateFlower(array) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                // 3D 玫瑰曲面: r = cos(k*phi)
                const k = 5;
                const r = 8 * Math.abs(Math.cos(k * phi)) * Math.sin(theta);

                array[i3] = r * Math.cos(phi) * Math.sin(theta);
                array[i3 + 1] = r * Math.cos(theta);
                array[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            }
        }

        function generateFirework(array) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 3 + Math.random() * 9;

                array[i3] = r * Math.sin(phi) * Math.cos(theta);
                array[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                array[i3 + 2] = r * Math.cos(phi);
            }
        }

        // ---- 4. UI 交互函数 ----
        function changeShape(shapeType) {
            if (shapeType === 'saturn') generateSaturn(targetPositions);
            else if (shapeType === 'heart') generateHeart(targetPositions);
            else if (shapeType === 'flower') generateFlower(targetPositions);
            else if (shapeType === 'firework') generateFirework(targetPositions);
        }

        function setupShapeButtons() {
            const buttons = document.querySelectorAll('.btn-shape');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    changeShape(this.dataset.shape);
                });
                // 键盘导航支持
                btn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });
        }

        function setupColorModes() {
            const modeButtons = document.querySelectorAll('.btn-mode');
            const rainbowControls = document.getElementById('rainbow-controls');
            const paletteControls = document.getElementById('palette-controls');
            const singleControls = document.getElementById('single-color-controls');
            const paletteStrip = document.getElementById('palette-strip');
            const btnAdd = document.getElementById('btn-add-color');
            const btnRemove = document.getElementById('btn-remove-color');
            const flowSlider = document.getElementById('flow-speed');
            const flowVal = document.getElementById('flow-speed-val');
            const colorInput = document.getElementById('particle-color');
            const colorHex = document.getElementById('color-hex');

            let paletteCount = 3;
            const MAX_COLORS = 5;
            const MIN_COLORS = 1;
            const DEFAULT_PALETTE = ['#ff006e', '#ffbe0b', '#00ffcc', '#3a86ff', '#8338ec'];

            const panels = { rainbow: rainbowControls, palette: paletteControls, single: singleControls };

            function updatePaletteUI() {
                const items = paletteStrip.querySelectorAll('.palette-color-item');
                items.forEach((item, i) => {
                    item.style.display = i < paletteCount ? '' : 'none';
                });
                if (shaderMaterial) {
                    shaderMaterial.uniforms.uPaletteSize.value = paletteCount;
                }
                btnAdd.disabled = paletteCount >= MAX_COLORS;
                btnRemove.disabled = paletteCount <= MIN_COLORS;
            }

            function addColor() {
                if (paletteCount >= MAX_COLORS) return;

                // 检查是否已有该索引的 DOM 元素
                let item = paletteStrip.querySelector(`.palette-color-item[data-index="${paletteCount}"]`);
                if (!item) {
                    item = document.createElement('div');
                    item.className = 'palette-color-item';
                    item.setAttribute('data-index', paletteCount);
                    const input = document.createElement('input');
                    input.type = 'color';
                    input.className = 'palette-dot';
                    input.value = DEFAULT_PALETTE[paletteCount];
                    input.setAttribute('data-index', paletteCount);
                    input.addEventListener('input', function() {
                        shaderMaterial.uniforms.uPaletteColors.value[parseInt(this.dataset.index)].set(this.value);
                    });
                    item.appendChild(input);
                    paletteStrip.appendChild(item);
                }
                shaderMaterial.uniforms.uPaletteColors.value[paletteCount].set(DEFAULT_PALETTE[paletteCount]);
                paletteCount++;
                updatePaletteUI();
            }

            function removeColor() {
                if (paletteCount <= MIN_COLORS) return;
                paletteCount--;
                updatePaletteUI();
            }

            // 模式切换
            modeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.dataset.mode;

                    Object.entries(panels).forEach(([key, el]) => {
                        el.style.display = (key === mode) ? '' : 'none';
                    });

                    switch (mode) {
                        case 'single':
                            shaderMaterial.uniforms.uColorMode.value = 0;
                            break;
                        case 'rainbow':
                            shaderMaterial.uniforms.uColorMode.value = 1;
                            break;
                        case 'palette':
                            shaderMaterial.uniforms.uColorMode.value = 2;
                            break;
                    }
                });
            });

            // 彩虹流速滑块
            flowSlider.addEventListener('input', () => {
                const val = parseFloat(flowSlider.value);
                flowVal.textContent = val.toFixed(2);
                shaderMaterial.uniforms.uFlowSpeed.value = val;
            });

            // 调色板颜色选择器（初始的3个）
            paletteStrip.querySelectorAll('.palette-dot').forEach(dot => {
                dot.addEventListener('input', function() {
                    shaderMaterial.uniforms.uPaletteColors.value[parseInt(this.dataset.index)].set(this.value);
                });
            });

            // 增减按钮
            btnAdd.addEventListener('click', addColor);
            btnRemove.addEventListener('click', removeColor);

            // 单色选择器
            colorInput.addEventListener('input', function() {
                colorHex.textContent = this.value;
                shaderMaterial.uniforms.uSingleColor.value.set(this.value);
            });

            updatePaletteUI();
        }

        function setupSizeSlider() {
            const sizeInput = $('#particle-size');
            sizeInput.addEventListener('input', function() {
                const val = this.value;
                sizeVal.textContent = val;
                shaderMaterial.uniforms.uSize.value = parseFloat(val);
            });
        }

        function setupRotationSpeedSlider() {
            const speedInput = $('#global-rot-speed');
            speedInput.addEventListener('input', function() {
                userSpeedSetting = parseFloat(this.value);
                speedVal.textContent = userSpeedSetting.toFixed(2) + 'x';
            });
        }

        function setupFullscreenButton() {
            $('#btn-fullscreen').addEventListener('click', function() {
                const el = document.documentElement;
                const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
                const rfs = el.requestFullscreen || el.webkitRequestFullscreen;
                const efs = document.exitFullscreen || document.webkitExitFullscreen;
                if (!fsEl) {
                    if (rfs) {
                        rfs.call(el).catch(() => {});
                    }
                } else {
                    if (efs) {
                        efs.call(document).catch(() => {});
                    }
                }
            });
        }

        function setupTogglePanel() {
            const panel = document.getElementById('ui-panel');
            const btn = document.getElementById('btn-toggle-panel');
            let visible = true;

            btn.addEventListener('click', () => {
                visible = !visible;
                if (visible) {
                    panel.classList.remove('hidden');
                    btn.classList.remove('shifted');
                    btn.textContent = '☰';
                } else {
                    panel.classList.add('hidden');
                    btn.classList.add('shifted');
                    btn.textContent = '☰';
                }
            });
        }

        function updateCamPos() {
            camera.position.x = 0;
            camera.position.y = 0;
            camera.position.z = cam.curDist;
            camera.lookAt(0, 0, 0);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ---- 5. MediaPipe 手势检测系统 ----
        function countFingers(landmarks) {
            let count = 0;
            // 大拇指
            const thumbTip = landmarks[4];
            if (Math.abs(thumbTip.x - landmarks[2].x) > 0.03) {
                count++;
            }
            // 其余四指
            const fingerPairs = [[8, 6], [12, 10], [16, 14], [20, 18]];
            for (let pair of fingerPairs) {
                if (landmarks[pair[0]].y < landmarks[pair[1]].y) {
                    count++;
                }
            }
            return count;
        }

        function determineRotationAxis(extendedFingers) {
            let newAxis = currentRotationAxis;
            if (smoothedFingerLength <= 0.26) {
                newAxis = 'Z';
            } else if (extendedFingers === 1) {
                newAxis = 'X';
            }

            if (newAxis === currentRotationAxis) {
                axisStickFrames = 0;
            } else {
                axisStickFrames++;
                if (axisStickFrames >= AXIS_STICK_MAX) {
                    currentRotationAxis = newAxis;
                    axisStickFrames = 0;
                }
            }
        }

        function determineSpread(extendedFingers) {
            if (smoothedFingerLength > 0.28 && extendedFingers >= 3) {
                targetSpread = THREE.MathUtils.mapLinear(smoothedFingerLength, 0.28, 0.42, 0.0, 1.5);
                statusTip.textContent = "🖐️ 变换：手掌全开 —— 粒子星云向外扩散";
            } else if (currentRotationAxis === 'Z') {
                targetSpread = 0.0;
                statusTip.textContent = "✊ 变换：检测到握拳 —— 激活【绕 Z 轴】自转";
            } else if (currentRotationAxis === 'X') {
                targetSpread = 0.0;
                statusTip.textContent = "☝️ 变换：检测到单根手指 —— 激活【绕 X 轴】自转";
            } else {
                targetSpread = 0.0;
                statusTip.textContent = "👋 手势就绪：伸出一根手指或握拳来改变旋转轴";
            }
            targetSpread = THREE.MathUtils.clamp(targetSpread, 0.0, 2.0);
        }

        function initHandTracking() {
            if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
                showError('MediaPipe 库加载失败，请检查网络连接后刷新页面');
                statusTip.textContent = 'MediaPipe 加载失败，手势识别不可用';
                return;
            }

            statusTip.innerHTML = '<span class="loader"></span>正在加载手势识别模型...';
            const videoElement = webcamEl;

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: isMobile ? 320 : 640,
                height: isMobile ? 240 : 480,
                facingMode: 'user'
            });
            cameraUtils.start().then(() => {
                statusTip.textContent = "手势系统就绪：请在摄像头前展示单手";
                videoElement.style.display = 'block';
                camBadge.style.display = 'block';
            }).catch(err => {
                statusTip.textContent = "摄像头访问失败：" + err.message;
                showError('无法访问摄像头，请检查权限设置');
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // 手指计数
                const extendedFingers = countFingers(landmarks);

                // 手势控制摄像机距离
                const dxBase = landmarks[5].x - landmarks[17].x;
                const dyBase = landmarks[5].y - landmarks[17].y;
                const handScreenSize = Math.sqrt(dxBase * dxBase + dyBase * dyBase);
                cam.targetDist = THREE.MathUtils.mapLinear(handScreenSize, 0.06, 0.22, 55, 15);
                cam.targetDist = THREE.MathUtils.clamp(cam.targetDist, 12, 60);

                // 手指张合度平滑
                const dxFist = landmarks[9].x - landmarks[0].x;
                const dyFist = landmarks[9].y - landmarks[0].y;
                const rawFingerLength = Math.sqrt(dxFist * dxFist + dyFist * dyFist);
                smoothedFingerLength += (rawFingerLength - smoothedFingerLength) * SMOOTH_FACTOR;

                // 轴判定
                determineRotationAxis(extendedFingers);

                // 扩散判定
                determineSpread(extendedFingers);

            } else {
                statusTip.textContent = "未检测到手势，粒子进入标准怠速模式";
                cam.targetDist = 30;
                targetSpread = 0.0;
                currentRotationAxis = 'X';
                axisStickFrames = 0;
                smoothedFingerLength += (0.3 - smoothedFingerLength) * 0.05;
            }
        }

        // ---- 6. 核心渲染与动画循环 (Animation Loop) ----
        function animate() {
            animFrameId = requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // 防止螺旋式崩溃

            // 0. 颜色流动时间推进
            shaderMaterial.uniforms.uTime.value += dt;

            // 1. 平滑缓动响应手势数值
            currentSpread += (targetSpread - currentSpread) * lerpFactor(8, dt);
            cam.curDist += (cam.targetDist - cam.curDist) * lerpFactor(6, dt);
            updateCamPos();

            // 2. 动态更新粒子顶点坐标 (形状插值与扩散)
            const positions = particleSystem.geometry.attributes.position.array;

            const spreadActive = currentSpread > 0.01;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const lerpFactorShape = lerpFactor(3, dt);

                // 向目标形态过渡
                positions[i3] += (targetPositions[i3] - positions[i3]) * lerpFactorShape;
                positions[i3 + 1] += (targetPositions[i3 + 1] - positions[i3 + 1]) * lerpFactorShape;
                positions[i3 + 2] += (targetPositions[i3 + 2] - positions[i3 + 2]) * lerpFactorShape;

                // 叠加手势张开带来的"外向扩散斥力场"
                if (spreadActive) {
                    const x = positions[i3];
                    const y = positions[i3 + 1];
                    const z = positions[i3 + 2];
                    const dist = Math.sqrt(x * x + y * y + z * z) || 1;

                    positions[i3] += (x / dist) * currentSpread * 0.15;
                    positions[i3 + 1] += (y / dist) * currentSpread * 0.15;
                    positions[i3 + 2] += (z / dist) * currentSpread * 0.15;
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            // 3. 换轴自转 + 丝滑归零
            const rotSpeed = animSpeedMul * userSpeedSetting * dt * 60; // 标准化到 60fps 基准速度

            const absX = Math.abs(particleSystem.rotation.x);
            const absY = Math.abs(particleSystem.rotation.y);
            const absZ = Math.abs(particleSystem.rotation.z);

            if (currentRotationAxis === 'X') {
                particleSystem.rotation.x += 0.025 * rotSpeed * 60;

                const lerpZero = lerpFactor(5, dt);
                particleSystem.rotation.y += absY > ZERO_SPEED ? (0 - particleSystem.rotation.y) * lerpZero : -particleSystem.rotation.y;
                particleSystem.rotation.z += absZ > ZERO_SPEED ? (0 - particleSystem.rotation.z) * lerpZero : -particleSystem.rotation.z;
            } else if (currentRotationAxis === 'Z') {
                particleSystem.rotation.z += 0.035 * rotSpeed * 60;

                const lerpZero = lerpFactor(5, dt);
                particleSystem.rotation.x += absX > ZERO_SPEED ? (0 - particleSystem.rotation.x) * lerpZero : -particleSystem.rotation.x;
                particleSystem.rotation.y += absY > ZERO_SPEED ? (0 - particleSystem.rotation.y) * lerpZero : -particleSystem.rotation.y;
            }

            // 星空背景缓慢自转
            if (starField) {
                starField.rotation.y += 0.0001 * rotSpeed * 60;
            }

            renderer.render(scene, camera);
        }

        // delta time 插值因子: 1 - exp(-speed * dt)
        function lerpFactor(speed, dt) {
            return 1 - Math.exp(-speed * dt);
        }

        // ---- 7. WebGL 上下文丢失处理 ----
        function handleContextLost(e) {
            e.preventDefault();
            isRunning = false;
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            statusTip.textContent = "WebGL 上下文丢失，渲染已暂停...";
        }

        // ---- 8. 页面卸载清理 ----
        function cleanup() {
            isRunning = false;
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            window.removeEventListener('resize', onWindowResize);
            if (renderer) {
                renderer.domElement.removeEventListener('webglcontextlost', handleContextLost);
                renderer.dispose();
            }
        }

        window.addEventListener('beforeunload', cleanup);
        window.addEventListener('pagehide', cleanup);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时保存摄像头流引用以便恢复
                if (webcamEl && webcamEl.srcObject) {
                    cameraStream = webcamEl.srcObject;
                }
            }
        });

        // ---- 9. 启动程序 ----
        function start() {
            initThree();
            initHandTracking();
            animate();

            // 隐藏启动遮罩
            const overlay = document.getElementById('start-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.5s';
                setTimeout(() => overlay.remove(), 500);
            }
        }

        // ---- 事件绑定 ----
        setupShapeButtons();
        setupColorModes();
        setupSizeSlider();
        setupRotationSpeedSlider();
        setupFullscreenButton();
        setupTogglePanel();

        // 启动按钮
        const startBtn = document.getElementById('start-btn');
        if (startBtn) {
            startBtn.addEventListener('click', start);
            startBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    start();
                }
            });
        }

    })();
    </script>
